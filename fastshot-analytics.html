<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastShot — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #00E676; --dark: #0A0D0F; --surface: #181D22; --surface2: #1E252D;
    --border: rgba(255,255,255,0.07); --text: #F0F4F8; --muted: #6B7A8D;
    --red: #FF5252; --gold: #FFD740; --blue: #448AFF;
  }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }

  /* LOGIN */
  #view-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,230,118,0.1) 0%, transparent 60%); }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px 36px; width: 100%; max-width: 380px; text-align: center; }
  .login-logo { font-size: 32px; margin-bottom: 6px; }
  .login-brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 28px; text-transform: uppercase; margin-bottom: 4px; }
  .login-brand em { color: var(--green); font-style: normal; }
  .login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
  .login-input { width: 100%; padding: 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; text-align: center; letter-spacing: 3px; margin-bottom: 14px; }
  .login-input:focus { border-color: rgba(0,230,118,0.4); }
  .login-input::placeholder { letter-spacing: 0; color: var(--muted); }
  .login-btn { width: 100%; padding: 16px; background: var(--green); border: none; border-radius: 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 17px; text-transform: uppercase; color: #000; cursor: pointer; }
  .login-error { font-size: 12px; color: var(--red); margin-top: 12px; display: none; }

  /* LAYOUT */
  #view-analytics { display: none; min-height: 100vh; }

  .topbar { position: sticky; top: 0; z-index: 50; background: rgba(10,13,15,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; }
  .topbar-brand em { color: var(--green); font-style: normal; }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); }
  .topbar-label { font-size: 13px; color: var(--muted); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .btn-sm { background: none; border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-sm:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-sm.green { color: var(--green); border-color: rgba(0,230,118,0.3); }
  .btn-sm.green:hover { background: rgba(0,230,118,0.08); }
  .btn-sm .spin { display: inline-block; }
  .btn-sm.spinning .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATS */
  .stats-section { padding: 24px 28px 0; display: flex; gap: 12px; flex-wrap: wrap; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 20px; flex: 1; min-width: 140px; }
  .kpi-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 36px; line-height: 1; margin-bottom: 4px; }
  .kpi-num.blue   { color: var(--blue); }
  .kpi-num.green  { color: var(--green); }
  .kpi-num.gold   { color: var(--gold); }
  .kpi-num.purple { color: #CE93D8; }
  .kpi-label { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .kpi-label strong { display: block; color: var(--text); font-size: 14px; margin-bottom: 2px; }

  /* SECTION TITLE */
  .section-header { padding: 28px 28px 16px; display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; }
  .section-count { font-size: 12px; color: var(--muted); }

  /* TABLE */
  .table-wrap { padding: 0 28px 60px; overflow-x: auto; }
  .data-table { width: 100%; border-collapse: collapse; min-width: 600px; }
  .data-table thead th {
    text-align: left; padding: 10px 14px;
    font-size: 10px; font-weight: 500; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .data-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .data-table tbody tr:hover { background: rgba(255,255,255,0.02); }
  .data-table tbody tr:last-child { border-bottom: none; }
  .data-table tbody td { padding: 14px 14px; font-size: 13px; color: var(--text); vertical-align: middle; }

  .td-avatar { width: 34px; height: 34px; border-radius: 50%; background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 13px; color: var(--green); flex-shrink: 0; }
  .td-name { font-weight: 500; }
  .td-email { color: var(--muted); font-size: 12px; }
  .td-badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-oui { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.25); color: var(--green); }
  .badge-non { background: rgba(107,122,141,0.1); border: 1px solid rgba(107,122,141,0.2); color: var(--muted); }
  .td-photos { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; color: var(--blue); }
  .td-date { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .td-anon { color: var(--muted); font-style: italic; font-size: 12px; }

  /* LOADING / ERROR / EMPTY */
  .state-box { display: flex; flex-direction: column; align-items: center; padding: 60px 28px; gap: 14px; text-align: center; }
  .loading-ring { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--surface2); border-top-color: var(--green); animation: spin 0.8s linear infinite; }
  .state-icon { font-size: 36px; }
  .state-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; color: var(--muted); }
  .state-sub { font-size: 13px; color: var(--muted); max-width: 300px; line-height: 1.6; }

  /* TOAST */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid rgba(0,230,118,0.4); border-radius: 12px; padding: 12px 20px; font-size: 13px; color: var(--text); z-index: 999; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">📊</div>
    <div class="login-brand">Fast<em>Shot</em></div>
    <div class="login-sub">Analytics participants · Réservé au club</div>
    <input class="login-input" type="password" id="passwordInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Accéder →</button>
    <div class="login-error" id="loginError">Mot de passe incorrect</div>
  </div>
</div>

<!-- ANALYTICS -->
<div id="view-analytics">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">Fast<em>Shot</em> Analytics</div>
      <div class="topbar-sep"></div>
      <div class="topbar-label">AOC vs FC Muret</div>
    </div>
    <div class="topbar-right">
      <button class="btn-sm" id="btnRefresh" onclick="loadData()"><span class="spin">↻</span> Actualiser</button>
      <button class="btn-sm green" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn-sm" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const ADMIN_PASSWORD = 'fastbreak2025';
  let allPhotos = [];
  let toastTimer;

  function tryLogin() {
    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
      document.getElementById('view-login').style.display = 'none';
      document.getElementById('view-analytics').style.display = 'block';
      loadData();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  }
  function logout() {
    document.getElementById('view-login').style.display = 'flex';
    document.getElementById('view-analytics').style.display = 'none';
    allPhotos = [];
  }

  async function loadData() {
    const btn = document.getElementById('btnRefresh');
    btn.classList.add('spinning');
    setContent(`<div class="state-box"><div class="loading-ring"></div><div class="state-title">Chargement…</div></div>`);

    try {
      const res = await fetch('/.netlify/functions/get-photos');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      allPhotos = data.photos || [];
      render();
    } catch(err) {
      setContent(`<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title" style="color:var(--red)">Erreur</div><div class="state-sub">${err.message}</div></div>`);
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function setContent(html) { document.getElementById('mainContent').innerHTML = html; }

  // Build participant list — group photos by email, or by "anonymous" per photo
  function getParticipants() {
    const byEmail = {};
    const anon = [];

    allPhotos.forEach(photo => {
      if (photo.email) {
        if (!byEmail[photo.email]) {
          byEmail[photo.email] = {
            prenom:     photo.prenom,
            nom:        photo.nom,
            fullName:   photo.fullName,
            email:      photo.email,
            newsletter: photo.newsletter,
            photos:     0,
            firstDate:  photo.created_at,
            lastDate:   photo.created_at,
          };
        }
        byEmail[photo.email].photos++;
        if (new Date(photo.created_at) < new Date(byEmail[photo.email].firstDate)) byEmail[photo.email].firstDate = photo.created_at;
        if (new Date(photo.created_at) > new Date(byEmail[photo.email].lastDate)) byEmail[photo.email].lastDate = photo.created_at;
      } else {
        anon.push(photo);
      }
    });

    const identified = Object.values(byEmail).sort((a,b) => new Date(b.firstDate) - new Date(a.firstDate));
    return { identified, anonCount: anon.length };
  }

  function render() {
    const { identified, anonCount } = getParticipants();
    const totalPhotos  = allPhotos.length;
    const totalPart    = identified.length;
    const newsletterOk = identified.filter(p => p.newsletter === 'oui').length;
    const anonPhotos   = anonCount;

    const kpiHtml = `
      <div class="stats-section">
        <div class="kpi"><div class="kpi-num blue">${totalPhotos}</div><div class="kpi-label"><strong>Photos reçues</strong>total de l'événement</div></div>
        <div class="kpi"><div class="kpi-num green">${totalPart}</div><div class="kpi-label"><strong>Participants identifiés</strong>avec email</div></div>
        <div class="kpi"><div class="kpi-num gold">${newsletterOk}</div><div class="kpi-label"><strong>Opt-in newsletter</strong>contacts marketing</div></div>
        <div class="kpi"><div class="kpi-num purple">${anonPhotos}</div><div class="kpi-label"><strong>Photos anonymes</strong>sans inscription</div></div>
      </div>
    `;

    let tableHtml = '';
    if (!identified.length) {
      tableHtml = `<div class="state-box"><div class="state-icon">📭</div><div class="state-title">Aucun participant</div><div class="state-sub">Les participants identifiés apparaîtront ici dès qu'ils rempliront le formulaire d'inscription.</div></div>`;
    } else {
      const rows = identified.map(p => {
        const initials = ((p.prenom[0]||'')+(p.nom[0]||'')).toUpperCase() || '?';
        const date = new Date(p.firstDate).toLocaleDateString('fr-FR');
        const time = new Date(p.firstDate).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
        const newsClass = p.newsletter === 'oui' ? 'badge-oui' : 'badge-non';
        const newsLabel = p.newsletter === 'oui' ? '✓ Oui' : '✕ Non';
        return `
          <tr>
            <td><div style="display:flex;align-items:center;gap:10px;">
              <div class="td-avatar">${initials}</div>
              <div>
                <div class="td-name">${p.fullName || '—'}</div>
                <div class="td-email">${p.email}</div>
              </div>
            </div></td>
            <td><span class="td-badge ${newsClass}">${newsLabel}</span></td>
            <td><span class="td-photos">${p.photos}</span></td>
            <td><div class="td-date">${date}<br>${time}</div></td>
          </tr>
        `;
      }).join('');

      tableHtml = `
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Participant</th>
                <th>Newsletter</th>
                <th>Photos</th>
                <th>1ère participation</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    setContent(kpiHtml + `
      <div class="section-header">
        <div class="section-title">Participants inscrits</div>
        <div class="section-count">${identified.length} personne(s)</div>
      </div>
    ` + tableHtml);
  }

  // ── EXPORT CSV
  function exportCSV() {
    const { identified } = getParticipants();
    if (!identified.length) { showToast('Aucun participant à exporter'); return; }

    const headers = ['Prénom', 'Nom', 'Email', 'Newsletter', 'Nb photos', 'Date participation'];
    const rows = identified.map(p => [
      p.prenom,
      p.nom,
      p.email,
      p.newsletter === 'oui' ? 'Oui' : 'Non',
      p.photos,
      new Date(p.firstDate).toLocaleDateString('fr-FR') + ' ' + new Date(p.firstDate).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})
    ]);

    const csvContent = [headers, ...rows]
      .map(row => row.map(cell => `"${String(cell||'').replace(/"/g,'""')}"`).join(';'))
      .join('\n');

    // Add BOM for Excel compatibility
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `fastshot-participants-${date}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(`✓ ${identified.length} participant(s) exporté(s)`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('visible'), 2500);
  }
</script>
</body>
</html>
