<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastShot — Analytics</title>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #00E676; --dark: #0A0D0F; --surface: #181D22; --surface2: #1E252D;
    --border: rgba(255,255,255,0.07); --text: #F0F4F8; --muted: #6B7A8D;
    --red: #FF5252; --gold: #FFD740; --blue: #448AFF;
  }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }

  /* ── LOGIN ── */
  #view-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,230,118,0.1) 0%, transparent 60%); }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px 36px; width: 100%; max-width: 380px; text-align: center; }
  .login-logo { font-size: 32px; margin-bottom: 6px; }
  .login-brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 28px; text-transform: uppercase; margin-bottom: 4px; }
  .login-brand em { color: var(--green); font-style: normal; }
  .login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
  .login-input { width: 100%; padding: 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; text-align: center; letter-spacing: 3px; margin-bottom: 14px; transition: border-color 0.2s; }
  .login-input:focus { border-color: rgba(0,230,118,0.4); }
  .login-input::placeholder { letter-spacing: 0; color: var(--muted); }
  .login-btn { width: 100%; padding: 16px; background: var(--green); border: none; border-radius: 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 17px; text-transform: uppercase; color: #000; cursor: pointer; box-shadow: 0 6px 24px rgba(0,230,118,0.25); }
  .login-error { font-size: 12px; color: var(--red); margin-top: 12px; display: none; }

  /* ── LAYOUT ── */
  #view-analytics { display: none; min-height: 100vh; }

  /* ── TOPBAR RESPONSIVE ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,13,15,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  .topbar-inner {
    height: 60px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .topbar-brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
  .topbar-brand em { color: var(--green); font-style: normal; }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  .topbar-event { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .topbar-event strong { color: var(--text); }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* Icon buttons (always visible) */
  .btn-icon {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border); background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); font-size: 16px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-icon:hover { color: var(--green); border-color: rgba(0,230,118,0.3); }
  .btn-icon.danger:hover { color: var(--red); border-color: rgba(255,82,82,0.3); }
  .btn-icon.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Text buttons — label hidden on mobile */
  .btn-text {
    background: none; border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 14px; font-size: 12px; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .btn-text:hover { color: var(--green); border-color: rgba(0,230,118,0.3); }
  .btn-text.export { color: var(--green); border-color: rgba(0,230,118,0.3); }
  .btn-text.export:hover { background: rgba(0,230,118,0.08); }
  .btn-text-label { display: inline; }

  /* Sub-row for match label on mobile */
  .topbar-match-tag {
    display: none;
    padding: 6px 20px 8px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  .topbar-match-tag strong { color: var(--text); }

  @media (max-width: 600px) {
    .topbar-sep,
    .topbar-event { display: none; }
    .topbar-match-tag { display: block; }
    .btn-text-label { display: none; }
    .btn-text { padding: 6px 10px; }
  }

  /* ── STATS ── */
  .stats-section { padding: 20px 20px 0; display: flex; gap: 10px; flex-wrap: wrap; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px; flex: 1; min-width: 120px; }
  .kpi-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 34px; line-height: 1; margin-bottom: 4px; }
  .kpi-num.blue   { color: var(--blue); }
  .kpi-num.green  { color: var(--green); }
  .kpi-num.gold   { color: var(--gold); }
  .kpi-num.purple { color: #CE93D8; }
  .kpi-label { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .kpi-label strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }

  /* ── SECTION HEADER ── */
  .section-header { padding: 24px 20px 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; }
  .section-count { font-size: 12px; color: var(--muted); }

  /* ── TABLE ── */
  .table-wrap { padding: 0 20px 60px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .data-table { width: 100%; border-collapse: collapse; min-width: 500px; }
  .data-table thead th { text-align: left; padding: 10px 14px; font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .data-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .data-table tbody tr:hover { background: rgba(255,255,255,0.02); }
  .data-table tbody tr:last-child { border-bottom: none; }
  .data-table tbody td { padding: 12px 14px; font-size: 13px; color: var(--text); vertical-align: middle; }

  .td-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 12px; color: var(--green); flex-shrink: 0; }
  .td-name { font-weight: 500; }
  .td-email { color: var(--muted); font-size: 12px; }
  .td-badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-oui { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.25); color: var(--green); }
  .badge-non { background: rgba(107,122,141,0.1); border: 1px solid rgba(107,122,141,0.2); color: var(--muted); }
  .td-photos { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; color: var(--blue); }
  .td-date { color: var(--muted); font-size: 12px; white-space: nowrap; }

  /* ── STATES ── */
  .state-box { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 14px; text-align: center; }
  .loading-ring { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--surface2); border-top-color: var(--green); animation: spin 0.8s linear infinite; }
  .state-icon { font-size: 36px; }
  .state-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; color: var(--muted); }
  .state-sub { font-size: 13px; color: var(--muted); max-width: 300px; line-height: 1.6; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid rgba(0,230,118,0.4); border-radius: 12px; padding: 12px 20px; font-size: 13px; color: var(--text); z-index: 999; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">📊</div>
    <div class="login-brand">Fast<em>Shot</em></div>
    <div class="login-sub">Analytics participants · Réservé au club</div>
    <input class="login-input" type="password" id="passwordInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Accéder →</button>
    <div class="login-error" id="loginError">Mot de passe incorrect</div>
  </div>
</div>

<!-- ANALYTICS -->
<div id="view-analytics">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <div class="topbar-brand">Fast<em>Shot</em> Analytics</div>
        <div class="topbar-sep"></div>
        <div class="topbar-event" id="topbarEvent">—</div>
      </div>
      <div class="topbar-right">
        <button class="btn-icon" id="btnRefresh" onclick="loadData()" title="Actualiser">↻</button>
        <button class="btn-text export" onclick="exportCSV()">
          ⬇ <span class="btn-text-label">Export CSV</span>
        </button>
        <button class="btn-icon danger" onclick="logout()" title="Déconnexion">⏻</button>
      </div>
    </div>
    <div class="topbar-match-tag" id="topbarMatchTag">Match — <strong>—</strong></div>
  </div>

  <div id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const ADMIN_PASSWORD = 'fastbreak2025';
  let allPhotos = [];
  let toastTimer;

  // ── AUTH
  function tryLogin() {
    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
      document.getElementById('view-login').style.display = 'none';
      document.getElementById('view-analytics').style.display = 'block';
      loadData();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  }
  function logout() {
    document.getElementById('view-login').style.display = 'flex';
    document.getElementById('view-analytics').style.display = 'none';
    allPhotos = [];
  }

  // ── LOAD
  async function loadData() {
    const btn = document.getElementById('btnRefresh');
    btn.classList.add('spinning');
    setContent(`<div class="state-box"><div class="loading-ring"></div><div class="state-title">Chargement…</div></div>`);
    try {
      const res = await fetch('/.netlify/functions/get-photos');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      allPhotos = data.photos || [];
      render();
    } catch(err) {
      setContent(`<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title" style="color:var(--red)">Erreur</div><div class="state-sub">${err.message}</div></div>`);
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function setContent(html) { document.getElementById('mainContent').innerHTML = html; }

  // ── PARTICIPANTS
  function getParticipants() {
    const byEmail = {};
    let anonCount = 0;
    allPhotos.forEach(photo => {
      if (photo.email) {
        if (!byEmail[photo.email]) {
          byEmail[photo.email] = { prenom: photo.prenom, nom: photo.nom, fullName: photo.fullName, email: photo.email, newsletter: photo.newsletter, photos: 0, firstDate: photo.created_at };
        }
        byEmail[photo.email].photos++;
        if (new Date(photo.created_at) < new Date(byEmail[photo.email].firstDate)) byEmail[photo.email].firstDate = photo.created_at;
      } else {
        anonCount++;
      }
    });
    const identified = Object.values(byEmail).sort((a,b) => new Date(b.firstDate) - new Date(a.firstDate));
    return { identified, anonCount };
  }

  // ── RENDER
  function render() {
    const { identified, anonCount } = getParticipants();
    const totalPhotos  = allPhotos.length;
    const newsletterOk = identified.filter(p => p.newsletter === 'oui').length;

    const kpiHtml = `
      <div class="stats-section">
        <div class="kpi"><div class="kpi-num blue">${totalPhotos}</div><div class="kpi-label"><strong>Photos reçues</strong>total</div></div>
        <div class="kpi"><div class="kpi-num green">${identified.length}</div><div class="kpi-label"><strong>Participants</strong>identifiés</div></div>
        <div class="kpi"><div class="kpi-num gold">${newsletterOk}</div><div class="kpi-label"><strong>Opt-in</strong>newsletter</div></div>
        <div class="kpi"><div class="kpi-num purple">${anonCount}</div><div class="kpi-label"><strong>Photos</strong>anonymes</div></div>
      </div>`;

    let tableHtml = '';
    if (!identified.length) {
      tableHtml = `<div class="state-box"><div class="state-icon">📭</div><div class="state-title">Aucun participant</div><div class="state-sub">Les participants inscrits apparaîtront ici dès qu'ils rempliront le formulaire.</div></div>`;
    } else {
      const rows = identified.map(p => {
        const initials = ((p.prenom?.[0]||'')+(p.nom?.[0]||'')).toUpperCase() || '?';
        const date = new Date(p.firstDate).toLocaleDateString('fr-FR');
        const time = new Date(p.firstDate).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
        return `<tr>
          <td><div style="display:flex;align-items:center;gap:10px;">
            <div class="td-avatar">${initials}</div>
            <div><div class="td-name">${p.fullName||'—'}</div><div class="td-email">${p.email}</div></div>
          </div></td>
          <td><span class="td-badge ${p.newsletter==='oui'?'badge-oui':'badge-non'}">${p.newsletter==='oui'?'✓ Oui':'✕ Non'}</span></td>
          <td><span class="td-photos">${p.photos}</span></td>
          <td><div class="td-date">${date} · ${time}</div></td>
        </tr>`;
      }).join('');

      tableHtml = `<div class="table-wrap"><table class="data-table">
        <thead><tr><th>Participant</th><th>Newsletter</th><th>Photos</th><th>1ère participation</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    }

    setContent(kpiHtml + `
      <div class="section-header">
        <div class="section-title">Participants inscrits</div>
        <div class="section-count">${identified.length} personne(s)</div>
      </div>` + tableHtml);
  }

  // ── EXPORT CSV
  function exportCSV() {
    const { identified } = getParticipants();
    if (!identified.length) { showToast('Aucun participant à exporter'); return; }
    const headers = ['Prénom','Nom','Email','Newsletter','Nb photos','Date participation'];
    const rows = identified.map(p => [
      p.prenom, p.nom, p.email,
      p.newsletter==='oui'?'Oui':'Non',
      p.photos,
      new Date(p.firstDate).toLocaleDateString('fr-FR')+' '+new Date(p.firstDate).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
    ]);
    const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(';')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `fastshot-participants-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast(`✓ ${identified.length} participant(s) exporté(s)`);
  }

  function showToast(msg) {
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('visible');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('visible'),2500);
  }

  // ── INJECT CONFIG
  document.addEventListener('DOMContentLoaded', () => {
    const C = window.FASTSHOT_CONFIG;
    if (!C) return;
    const label = `${C.match.domicile} vs ${C.match.exterieur}`;
    const el = document.getElementById('topbarEvent');
    const tag = document.getElementById('topbarMatchTag');
    if (el) el.innerHTML = `Match <strong>${label}</strong>`;
    if (tag) tag.innerHTML = `Match <strong>${label}</strong>`;
  });
</script>
</body>
</html>
